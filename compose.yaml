services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    env_file:
      - .env.docker
    volumes:
      - ./pgdata:/var/lib/postgresql/data    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asset_management"]  
      interval: 5s
      timeout: 5s
      retries: 5

